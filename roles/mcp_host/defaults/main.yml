---

# -------------------------------------------------
# Default Variables
# -------------------------------------------------

# Ansible become settings - fixes ACL errors when becoming unprivileged user
# Set to true if you get: "chmod: invalid mode: 'A+user:lab-user:rx:allow'"
mcp_host_allow_world_readable_tmpfiles: true

mcp_host_podman_username: "{{ registry_credentials_username }}"
mcp_host_podman_password: "{{ registry_credentials_password }}"

mcp_host_satellite_url: "https://satellite-{{ subdomain }}"

# Use HTTPS for CA cert download when verify_ssl is enabled
mcp_host_satellite_ca_cert_url: >-
  {{ 'https' if (mcp_host_verify_ssl | default(true)) else 'http' }}://satellite-{{ subdomain }}/unattended/public/foreman_raw_ca

mcp_host_server_image: >-
 registry.redhat.io/satellite/foreman-mcp-server-rhel9@sha256:fd6b99a7c68025279ceeb0a27751039043706a0da2569e3b613752724bfc31a6

# This should be set by satellite_reconfigure role or passed as a variable
mcp_host_satellite_admin_access_token: ""

# SSL verification - set to false for lab environments with self-signed certs
mcp_host_verify_ssl: false

# Container command - conditionally includes --no-verify-ssl based on mcp_host_verify_ssl
mcp_host_container_command:
  - "--foreman-url"
  - "{{ mcp_host_satellite_url }}"
  - "{{ '--no-verify-ssl' if not (mcp_host_verify_ssl | bool) else '' }}"
