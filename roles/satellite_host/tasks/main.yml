---
- name: Install katello-ca-consumer RPM
  ansible.builtin.dnf:
    name: "{{ satellite_host_katello_ca_rpm }}"
    state: present
    disable_gpg_check: true

- name: Replace Hostname in /etc/rhsm/rhsm.conf
  replace:
    path: /etc/rhsm/rhsm.conf
    regexp: "^hostname = satellite\\.lab"
    replace: "hostname = satellite"

- name: Register Nodes to Satellite
  community.general.redhat_subscription:
    state: present
    org_id: "{{ satellite_host_org }}"
    activationkey: "{{ satellite_host_activation_key }}"

- name: Install extra packages
  ansible.builtin.package:
    name: "{{ satellite_host_extra_packages }}"
    state: present

- block:
    - name: Initialize the db
      ansible.builtin.command: >-
        /usr/bin/postgresql-setup --initdb

  rescue:
    - ansible.builtin.file: 
        path: /var/lib/pgsql/data
        state: absent

    - name: Initialize the db
      ansible.builtin.command: >-
        /usr/bin/postgresql-setup --initdb

- name: Enable and start the postgresql service
  ansible.builtin.service:
    name: postgresql
    enabled: yes
    state: started
